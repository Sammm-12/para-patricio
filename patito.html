<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Patricio 🤍</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;

    background: linear-gradient(135deg, #ffe6f0, #e6f0ff, #f7e6ff);

    overflow-x: hidden;
    overflow-y: auto;

    position: relative;
}

/* 💖 CORAZONES ARREGLADOS */
.heart {
    position: fixed;
    top: -10vh;
    color: rgba(255, 105, 135, 0.35);
    font-size: 18px;
    animation: float 7s linear infinite;
    pointer-events: none;
    z-index: 0;
}

/* 💖 ANIMACIÓN ESTABLE */
@keyframes float {
    0% {
        transform: translateY(110vh) translateX(0) scale(0.8);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    100% {
        transform: translateY(-20vh) translateX(20px) scale(1.2);
        opacity: 0;
    }
}

/* 💌 SOBRE */
#contenedor-sobre {
    display:flex;
    flex-direction:column;
    align-items:center;
    z-index: 2;
}

.sobre {
    width: 280px;
    height: 180px;
    background: linear-gradient(135deg, #ffd6e0, #ffc2d1);
    position: relative;
    border-radius: 0 0 12px 12px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    cursor: pointer;
}

.sobre::before {
    content:'';
    position:absolute;
    top:0;
    border-left:140px solid transparent;
    border-right:140px solid transparent;
    border-top:100px solid #ffb3c6;
}

.corazon-cierre {
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    animation: latido 1.2s infinite;
}

.texto-sobre {
    margin-top:20px;
    background:white;
    padding:8px 14px;
    border-radius:20px;
    font-weight:bold;
    color:#7a5c61;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

/* 💌 CARTA */
#carta-contenido {
    display:none;
    max-width:480px;
    background: rgba(255,255,255,0.92);
    padding:28px;
    border-radius:24px;
    text-align:center;

    box-shadow: 0 20px 60px rgba(0,0,0,0.15);

    opacity:0;
    transform: scale(0.95) translateY(40px);
    transition: 0.9s ease;
    z-index: 3;
}

#carta-contenido.mostrar {
    opacity:1;
    transform: scale(1) translateY(0);
}

.titulo {
    font-size:1.7rem;
    color:#5a3e44;
    margin-bottom:10px;
}

.subtitulo {
    font-size:0.9rem;
    color:#a58b92;
    letter-spacing:1px;
    margin-bottom:15px;
}

.parrafo {
    color:#5c4a4f;
    margin:18px 0;
    line-height:1.7;
    text-align:justify;
}

.imagen-pucca {
    width:100%;
    border-radius:16px;
    margin:15px 0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* 💌 BOTÓN */
.btn-mensaje {
    background: linear-gradient(135deg,#ff8fab,#ffb3c6);
    border:none;
    color:white;
    padding:12px 28px;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
    margin-top:15px;
}

.btn-mensaje:hover {
    transform: scale(1.05);
}

/* 💬 MENSAJE */
.contenedor-sorpresa {
    margin-top:15px;
    background:#fff0f5;
    padding:15px;
    border-radius:16px;
    border:1px solid rgba(255,179,198,0.4);
}

#texto-sorpresa {
    color:#d63384;
    font-weight:600;
}

/* 💖 ANIMACIÓN LATIDO */
@keyframes latido {
    0% {transform:translate(-50%,-50%) scale(1);}
    50% {transform:translate(-50%,-50%) scale(1.15);}
    100% {transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<!-- 💖 CORAZONES -->
<script>
for (let i = 0; i < 20; i++) {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "🤍";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (5 + Math.random() * 5) + "s";
    h.style.fontSize = (12 + Math.random() * 20) + "px";
    document.body.appendChild(h);
}
</script>

<!-- 💌 SOBRE -->
<div id="contenedor-sobre">
    <div class="sobre" onclick="abrirSobre()">
        <div class="corazon-cierre">💗</div>
    </div>
    <div class="texto-sobre">✨ toca el sobre ✨</div>
</div>

<!-- 💌 CARTA -->
<div id="carta-contenido">

    <h1 class="titulo">🤍 Para Patricio</h1>

    <div class="subtitulo">Un pequeño destello de cariño</div>

    <img class="imagen-pucca" src="WhatsApp Image 2026-07-04 at 14.10.37 (1).jpeg">

    <p class="parrafo">Coincidir contigo es mi parte favorita de los días. ✨</p>

    <img class="imagen-pucca" src="WhatsApp Image 2026-07-04 at 14.10.37 (2).jpeg">

    <p class="parrafo">Me gusta caminar contigo en este momento de la vida. 🌸</p>

    <img class="imagen-pucca" src="WhatsApp Image 2026-07-04 at 14.10.37 (3).jpeg">

    <p class="parrafo">Me gusta descubrirte en cada detalle. 🧸</p>

    <img class="imagen-pucca" src="WhatsApp Image 2026-07-04 at 14.10.37.jpeg">

    <p class="parrafo" style="text-align:center; font-weight:600;">
        🤍 Gracias por estar en mi historia.
    </p>

    <div class="contenedor-sorpresa">
        <p id="texto-sorpresa">Haz clic para ver mensajes secretos 💌</p>
    </div>

    <button class="btn-mensaje" onclick="mostrarMensaje()">ver más ✨</button>

</div>

<script>

function abrirSobre() {
    document.querySelector('.sobre').style.transform = "scale(0.9)";
    
    setTimeout(() => {
        document.getElementById('contenedor-sobre').style.display = "none";
        const carta = document.getElementById('carta-contenido');
        carta.style.display = "block";
        setTimeout(() => carta.classList.add('mostrar'), 50);
    }, 600);
}

const mensajes = [
"Me haces enojar pero tqm ❤️",
"Gracias por tenerme paciencia 🙈",
"Espero que haya guste 🫶🏼",
"¡Y ya deja de ser resabiado! 😒"
"Besitos bebe❤️"
];

let i = 0;

function mostrarMensaje() {
    const texto = document.getElementById("texto-sorpresa");

    texto.innerText = mensajes[i];
    i++;

    if (i >= mensajes.length) i = 0;
}

</script>

</body>
</html>

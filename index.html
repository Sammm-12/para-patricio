<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Patricio 🤍</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap');

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#e0c3fc,#8ec5fc);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

/* SOBRE */
#envelope {
    width:200px;
    height:140px;
    background:#ff4d6d;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:500;
    cursor:pointer;
    position:absolute;
    transition:0.6s ease;
}

#envelope.open {
    transform: translateY(-180px);
    opacity:0;
}

/* CARTA */
.container {
    background: rgba(255,255,255,0.8);
    padding:40px 30px;
    border-radius:24px;
    max-width:480px;
    text-align:center;

    opacity:0;
    transform:translateY(30px);
    transition:0.8s ease;
}

.container.show {
    opacity:1;
    transform:translateY(0);
}

h1 {
    color:#4a4e69;
}

.img-pucca {
    width:100%;
    border-radius:16px;
    margin:15px 0;
}

/* BOTÓN */
button {
    background:linear-gradient(135deg,#ff4d6d,#ff758f);
    color:white;
    padding:12px 30px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    margin-top:20px;
}

#msg {
    margin-top:10px;
    color:#ff4d6d;
    opacity:0;
    transition:0.3s;
}

#msg.show {
    opacity:1;
}
</style>
</head>

<body>

<!-- SOBRE -->
<div id="envelope" onclick="abrir()">
💌 Abrir
</div>

<!-- CARTA -->
<div class="container" id="carta">

    <!-- TEXTO INICIAL -->
    <h1>De Sanyi para Patricio 🤍</h1>

    <img src="WhatsApp Image 2026-07-04 at 02.51.30.jpeg" class="img-pucca">

    <p>Coincidir contigo es mi parte favorita de los días...</p>

    <img src="WhatsApp Image 2026-07-04 at 02.51.30 (1).jpeg" class="img-pucca">

    <p>No sé qué nos depara el destino...</p>

    <img src="WhatsApp Image 2026-07-04 at 02.51.31.jpeg" class="img-pucca">

    <p>Me gusta descubrir tu mundo...</p>

    <button onclick="mensajes()">ver más ✨</button>

    <div id="msg"></div>

</div>

<script>

const frases = [
"✨ Cada pensamiento de hoy lleva tu nombre.",
"🤍 Eres un lugar seguro en mis días.",
"🧸 Me gusta cómo coincides conmigo.",
"🌙 Ojalá estés sonriendo ahora mismo.",
"💌 Gracias por existir en mi vida."
];

let index = 0;

function abrir() {
    document.getElementById("envelope").classList.add("open");

    setTimeout(() => {
        document.getElementById("envelope").style.display = "none";
        document.getElementById("carta").classList.add("show");
    }, 600);
}

function mensajes() {
    const msg = document.getElementById("msg");

    msg.innerText = frases[index];
    msg.classList.add("show");

    index++;
    if (index >= frases.length) {
        index = 0; // reinicia
    }
}

</script>

</body>
</html>
